<!-- ============================================================
     SIDEBAR.HTML — Workify Dashboard Sidebar
     Used only on authenticated/dashboard pages.
     Loaded by shared.js into:  <div id="sidebar-placeholder"></div>
     
     On desktop: full 260px sidebar
     On tablet:  collapses to 64px icon rail
     On mobile:  becomes a bottom navigation bar (handled by CSS)
     ============================================================ -->

<aside class="sidebar" id="main-sidebar">
  <!-- ===== Logo (top of sidebar) ===== -->
  <div class="sidebar-logo flex items-center gap-2 mb-8">
    <a href="#" data-route="index.html" class="flex items-center gap-2">

          stroke="white"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />

          <linearGradient id="sb-logo-grad" x1="0" y1="0" x2="32" y2="32">
            <stop stop-color="#5B4FE9" />
            <stop offset="1" stop-color="#A78BFA" />
          </linearGradient>
        </defs>
      </svg>
      <span
        class="sidebar-label font-display font-bold text-md"
        style="color: var(--text-primary)"

      >
    </a>
  </div>

  <!-- ===== Navigation links ===== -->

        <rect x="14" y="3" width="7" height="7" rx="1" />
        <rect x="3" y="14" width="7" height="7" rx="1" />
        <rect x="14" y="14" width="7" height="7" rx="1" />
      </svg>
      <span class="sidebar-label">Dashboard</span>
    </a>

    <!-- Browse Jobs -->

      data-route="pages/browse-jobs.html"
      class="sidebar-link"
      data-page="browse-jobs"
    >

        height="20"
        viewBox="0 0 24 24"
        fill="none"

    >

        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
        <polyline points="14 2 14 8 20 8" />

      <span class="sidebar-label">Proposals</span>

    <!-- Contracts -->
    <a

      class="sidebar-link"
      data-page="active-contract"
    >

      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"

        fill="none"

  <!-- ===== Bottom section: role badge + collapse button ===== -->
  <div class="mt-8">

    <div class="sidebar-role-badge mb-4">

    <!-- Collapse / expand button -->
    <button
      class="btn-icon sidebar-collapse-btn w-full flex justify-center"
      id="sidebar-collapse-toggle"
      aria-label="Toggle sidebar"
    >
      <!-- Lucide: chevrons-left -->
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"

        stroke-linejoin="round"

        <polyline points="11 17 6 12 11 7" />
        <polyline points="18 17 13 12 18 7" />

    </button>

</aside>

<!-- ===== Sidebar-specific styles ===== -->
<style>
  /* Sidebar nav link */
  .sidebar-link {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3) var(--space-3);
    color: var(--text-muted);
    font-size: var(--fs-base);
    font-weight: var(--fw-medium);
    border-radius: var(--radius-sm);
    transition: all 0.2s ease;
    text-decoration: none;
  }
  .sidebar-link:hover {
    background: rgba(255, 255, 255, 0.04);
    color: var(--text-primary);
  }
  .sidebar-link.active {
    background: rgba(91, 79, 233, 0.12);
    color: var(--primary-light);
  }

  /* Icon stays centered when labels are hidden */
  .sidebar-link svg {
    flex-shrink: 0;
  }

  /* Collapsed sidebar — center the icons */
  .sidebar.collapsed .sidebar-link {
    justify-content: center;
    padding: var(--space-3);
  }
  .sidebar.collapsed .sidebar-role-badge {
    display: none;
  }

  /* Flip the collapse icon when sidebar is collapsed */
  .sidebar.collapsed #collapse-icon {
    transform: rotate(180deg);
  }

  /* On mobile, sidebar links go horizontal (bottom nav style) */
  @media (max-width: 767px) {
    .sidebar-link {
      flex-direction: column;
      gap: 2px;
      font-size: 10px;
      padding: var(--space-1);
    }
    .sidebar-link svg {
      width: 20px;
      height: 20px;
    }
  }
</style>
