      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/layout.css" />

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <body>
    <!-- ═══ SIDEBAR (loaded by shared.js) ═════════════════════ -->
    <div
      id="sidebar-placeholder"
      data-component="components/sidebar-freelancer.html"
    ></div>

    <!-- ═══ MAIN ═══════════════════════════════════════════════════ -->
    <div class="main-wrapper">
      <header class="topbar">
        <span class="topbar-title">My Proposals</span>
        <div class="topbar-actions">
          <div class="role-badge">Freelancer</div>
          <div class="icon-btn">
            <i data-lucide="bell" style="width: 18px; height: 18px"></i>
            <span class="notif-dot"></span>
          </div>
          <div class="avatar" style="cursor: pointer">AK</div>
        </div>
      </header>

      <main class="content">
        <div class="page-heading">
          <h1 class="page-title">My Proposals</h1>
          <p class="page-subtitle">Track and manage all your submitted bids</p>
        </div>

        <!-- TAB BAR -->
        <div class="tab-bar" role="tablist">
          <button
            class="tab-btn active"
            role="tab"
            onclick="switchTab('submitted', this)"
          >
            Submitted (5)
          </button>
          <button
            class="tab-btn"
            role="tab"
            onclick="switchTab('active', this)"
          >
            Active (2)
          </button>
          <button
            class="tab-btn"
            role="tab"
            onclick="switchTab('archived', this)"
          >
            Archived (8)
          </button>
        </div>

        <!-- TABLE CARD -->
        <div class="table-card" id="tableCard">
          <!-- TABLE HEAD -->
          <div class="table-head">
            <div class="th">Job Title</div>
            <div class="th">Client</div>
            <div class="th">Bid Amount</div>
            <div class="th">Submitted</div>
            <div class="th">Status</div>
          </div>

          <!-- TABLE BODY -->
          <div class="table-body" id="tableBody"></div>
        </div>
      </main>
    </div>

    <script src="../js/shared.js"></script>
    <script>
      lucide.createIcons();

          },
          {
            id: 3,

            bidNote: "$2,200 fixed",
            timeline: "Apr 18, 2026",
            response: null,
          },
          {
            id: 4,
            title: "E-commerce Landing Page Redesign",
            client: "StartupXYZ",
            bid: "$800",
            date: "Mar 2, 2026",
            status: "declined",
            coverLetter:
              "I'd love to help StartupXYZ with a high-converting landing page. My e-commerce UI work has led to conversion rate improvements of 15–30% on average.",
            bidNote: "$800 fixed",
            timeline: "Mar 20, 2026",
            response:
              "Thank you for your proposal. We went with another freelancer for this project.",
          },
          {
            id: 5,
            title: "Blockchain Dashboard – Crypto Analytics",
            client: "CryptoBase",
            bid: "$6,500",

          },
        ],
        active: [
          {

          {

          {

          },
          {
            id: 14,
            title: "GraphQL API Migration",
            client: "TechNova",
            bid: "$55/hr",
            date: "Nov 20, 2025",
            status: "archived",
            coverLetter: "REST-to-GraphQL migration with schema stitching.",
            bidNote: "$55/hr",
            timeline: "Dec 31, 2025",
            response: null,
          },
          {
            id: 15,
            title: "iOS Swift App — Fitness Tracker",
            client: "FitLife",
            bid: "$5,500",
            date: "Nov 10, 2025",
            status: "archived",
            coverLetter:
              "Native iOS app with HealthKit integration and custom UI.",
            bidNote: "$5,500 fixed",
            timeline: "Jan 15, 2026",
            response: "Proposal archived.",
          },
        ],
      };

      let currentTab = "submitted";
      let expandedId = null;

      /* ── Render table ─────────────────────────────────────────── */
      function renderTable(tabKey) {
        const rows = DATA[tabKey];
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";

        if (!rows || rows.length === 0) {
          tbody.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><i data-lucide="inbox"></i></div>
          <div class="empty-title">No proposals here</div>
          <div class="empty-sub">You don't have any ${tabKey} proposals yet. Start by browsing available jobs.</div>
          <button class="btn-browse"><i data-lucide="search"></i> Browse Jobs</button>
        </div>`;
          lucide.createIcons();
          return;
        }

        rows.forEach((row, idx) => {
          // Row
          const tr = document.createElement("div");
          tr.className = "table-row";
          tr.dataset.id = row.id;
          tr.style.animationDelay = `${0.05 + idx * 0.05}s`;

          const badgeClass =
            {
              pending: "badge-pending",
              active: "badge-active",
              declined: "badge-declined",
              archived: "badge-archived",
            }[row.status] || "badge-archived";

          const statusLabel =
            row.status.charAt(0).toUpperCase() + row.status.slice(1);

          tr.innerHTML = `
        <div class="td job-title-cell">
          <i data-lucide="chevron-down" class="expand-chevron"></i>
          ${row.title}
        </div>
        <div class="td client-cell">${row.client}</div>
        <div class="td bid-cell">${row.bid}</div>
        <div class="td date-cell">${row.date}</div>
        <div class="td">
          <span class="status-badge ${badgeClass}">
            <span class="status-dot"></span>${statusLabel}
          </span>
        </div>
      `;
          tr.addEventListener("click", () => toggleRow(row.id));

          // Detail panel
          const dp = document.createElement("div");
          dp.className = "detail-panel";
          dp.dataset.detailFor = row.id;

          const responseHtml = row.response
            ? `<div class="client-response has-response"><strong style="color:var(--primary-light);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;">Client Response</strong><br>${row.response}</div>`
            : `<div class="client-response"><em>No client response yet.</em></div>`;

          dp.innerHTML = `
        <div class="detail-inner">
          <div>
            <div class="detail-section-title">Cover Letter</div>
            <div class="cover-letter-preview">${row.coverLetter}</div>
            ${responseHtml}
          </div>
          <div class="detail-meta">
            <div class="detail-section-title">Proposal Details</div>
            <div class="detail-meta-row">
              <span class="meta-label">Bid</span>
              <span class="meta-value accent">${row.bidNote}</span>
            </div>
            <div class="detail-meta-row">
              <span class="meta-label">Proposed Delivery</span>
              <span class="meta-value">${row.timeline}</span>
            </div>
            <div class="detail-meta-row">
              <span class="meta-label">Client</span>
              <span class="meta-value">${row.client}</span>
            </div>
            <div class="detail-meta-row">
              <span class="meta-label">Submitted</span>
              <span class="meta-value">${row.date}</span>
            </div>
          </div>
        </div>
      `;

          tbody.appendChild(tr);
          tbody.appendChild(dp);
        });

        lucide.createIcons();
      }

      /* ── Toggle row expand ────────────────────────────────────── */
      function toggleRow(id) {
        const panel = document.querySelector(
          `.detail-panel[data-detail-for="${id}"]`,
        );
        const row = document.querySelector(`.table-row[data-id="${id}"]`);

        if (expandedId === id) {
          // Close
          panel.classList.remove("open");
          row.classList.remove("expanded");
          expandedId = null;
        } else {
          // Close any open
          if (expandedId !== null) {
            const prevPanel = document.querySelector(
              `.detail-panel[data-detail-for="${expandedId}"]`,
            );
            const prevRow = document.querySelector(
              `.table-row[data-id="${expandedId}"]`,
            );
            if (prevPanel) prevPanel.classList.remove("open");
            if (prevRow) prevRow.classList.remove("expanded");
          }
          panel.classList.add("open");
          row.classList.add("expanded");
          expandedId = id;
        }
      }

      /* ── Switch tab ───────────────────────────────────────────── */
      function switchTab(tabKey, btn) {
        currentTab = tabKey;
        expandedId = null;

        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");

        renderTable(tabKey);
      }

      // Initial render
      renderTable("submitted");
    </script>
  </body>
</html>
